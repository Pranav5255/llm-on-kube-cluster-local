apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: llm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-startup
  namespace: llm
data:
  entrypoint.sh: |
    #!/bin/sh
    set -e
    ollama serve &
    PID=$!
    echo "Waiting for Ollama API..."
    for i in $(seq 1 120); do
      if ollama list >/dev/null 2>&1; then
        break
      fi
      sleep 1
    done
    MODEL="${OLLAMA_MODEL:-phi3:mini}"
    echo "Pulling model: $MODEL"
    ollama pull "$MODEL" || exit 1
    echo "Model ready."
    wait $PID
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: llm
  labels:
    app: ollama
spec:
  replicas: 1
  # Default 600s is too short for first registry pull + phi3:mini download inside the pod
  progressDeadlineSeconds: 3600
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_MODEL
              value: "phi3:mini"
          command: ["/bin/sh", "/config/entrypoint.sh"]
          volumeMounts:
            - name: ollama-root
              mountPath: /root/.ollama
            - name: startup
              mountPath: /config
          resources:
            requests:
              cpu: "500m"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 12Gi
          startupProbe:
            httpGet:
              path: /api/tags
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 40
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: ollama-root
          persistentVolumeClaim:
            claimName: ollama-data
        - name: startup
          configMap:
            name: ollama-startup
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: llm
spec:
  type: NodePort
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: http
      nodePort: 30080
