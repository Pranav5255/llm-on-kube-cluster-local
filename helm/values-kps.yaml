alertmanager:
  enabled: false

grafana:
  adminPassword: changeme
  service:
    type: NodePort
    nodePort: 32000
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

prometheus:
  prometheusSpec:
    retention: 2d
    scrapeInterval: 30s
    resources:
      requests:
        cpu: 100m
        memory: 384Mi
      limits:
        memory: 1Gi

kubeStateMetrics:
  enabled: true
  resources:
    requests:
      cpu: 20m
      memory: 64Mi

nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 20m
      memory: 64Mi

defaultRules:
  create: true

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
